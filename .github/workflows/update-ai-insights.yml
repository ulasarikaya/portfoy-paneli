name: AI içgörülerini güncelle (hedef fiyat + öne çıkanlar)

on:
  schedule:
    # Haftada bir, Pazartesi 06:00 UTC. Maliyeti azaltmak istersen örn. ayda
    # bire düşür: '0 6 1 * *'
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-ai-insights:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları kur
        run: pip install -r requirements.txt

      - name: AI içgörülerini çek
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_ai_insights.py

      - name: Değişiklik varsa commit + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ai_cache.json
          git diff --staged --quiet || git commit -m "AI içgörüleri güncellendi $(date -u +'%Y-%m-%d')"
          git push
